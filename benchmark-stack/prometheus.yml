global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:

  # ============================================
  # AKASH TRAINER METRICS
  # ============================================
  - job_name: akash-trainer
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'provider.h100.ams.val.akash.pub:30296'
        labels:
          platform: akash
          gpu: h100
          exporter: custom-trainer

  # ============================================
